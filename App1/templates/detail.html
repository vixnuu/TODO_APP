<!DOCTYPE html>
<html lang="en">
  <head>
    <!-- Required meta tags -->
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <!-- Bootstrap CSS -->
    <!-- https://cdnjs.com/libraries/twitter-bootstrap/5.0.0-beta1 -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/twitter-bootstrap/5.0.0-beta1/css/bootstrap.min.css"
    />

    <!-- Icons: https://getbootstrap.com/docs/5.0/extend/icons/ -->
    <!-- https://cdnjs.com/libraries/font-awesome -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.2/css/all.min.css"
    />

    <title>Hello, world!</title>
  </head>
  <body class="d-flex vw-100 vh-100 align-items-center justify-content-center">
    
    <div class="card shadow" style="min-width: 350px;">
        <div class="card-header bg-primary text-white">
            <h4 class="mb-0">Task Detail</h4>
        </div>
        <div class="card-body">
            <h5 class="card-title">{{ todo.title }}</h5>
            <p class="card-text">{{ task.description }}</p>
            <p>created by: {{request.user.first_name}}</p>
            <p class="card-text">
          <small class="text-muted">Created: {{ todo.created_at }}</small>
            </p>
            <p class="card-text">
              <small class="text-muted">Status: 
                  {% if todo.is_completed %}
                <span class="badge bg-success">Completed</span>
                  {% else %}
                <span class="badge bg-warning text-dark">Pending</span>
                  {% endif %}
              </small>
              
            </p>
            
            <a href="{% url 'home' %}" class="btn btn-secondary mt-2">
          <i class="fas fa-arrow-left"></i> Back to List
            </a>
            
            <a href="{% url 'todo_update' todo.id %}" class="btn btn-primary mt-2">
          <i class="fas fa-edit"></i> Update
            </a>
            
              {% if request.user == todo.creator %}

            <a href="{% url 'todo_delete' todo.id %}" class="btn btn-danger mt-2">
          <i class="fas fa-trash"></i> Delete
            </a>
              {% endif %}

        </div>
    </div>

    <!-- Optional JavaScript; choose one of the two! -->

    <!-- Option 1: Bootstrap Bundle with Popper -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/twitter-bootstrap/5.0.0-beta1/js/bootstrap.bundle.min.js"></script>

    <!-- Option 2: Separate Popper and Bootstrap JS -->

    <!-- https://cdnjs.com/libraries/popper.js/2.5.4 -->
    <!-- <script
      src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/2.5.4/umd/popper.min.js"
    ></script>
    <script
      src="https://cdnjs.cloudflare.com/ajax/libs/twitter-bootstrap/5.0.0-beta1/js/bootstrap.min.js"
    ></script> -->

    <!-- More: https://getbootstrap.com/docs/5.0/getting-started/introduction/ -->
  </body>
</html>
